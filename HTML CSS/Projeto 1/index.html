<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <title>Survey Form</title>
    <link rel='stylesheet' href='styles.css'>
  </head>
  <body>
    <h1 id='title'>freeCodeCamp Survey Form</h1>
    <p id='description'><i>Thank you for taking the time to help us improve the platform</i></p>
    <form id='survey-form'>
      <label id='name-label'>Name<input id='name' type='text' required placeholder='Enter your Name'></label>
      <label id='email-label'>Email<input id='email' type='email' required placeholder='Enter your Email'></label>
      <label id='number-label'>Age(optional)<input id='number' type='number' min='15' max='100' placeholder='Age'></label>
      <select id='dropdown'>
        <option>Select current role</option>
        <option>Student</option>
        <option>Full Time Job</option>
        <option>Full Time Leaner</option>
        <option>Prefer Not To Say</option>
        <option>Other</option>
      </select>
      <label>Would you recommend freeCodeCamp to a friend?</label>
      <label>
        <input name='recommendation' type='radio' value='yes' checked> Definitely
      </label>
      <label>
        <input name='recommendation' type='radio' value='maybe'> Maybe
      </label>
      <label>
        <input name='recommendation' type='radio' value='no'> Not sure
      </label>
      <fieldset>
        <legend>What would you like to see improved? (Check all that apply)</legend>
      <input id='checkbox 1' type='checkbox' value='checkbox 1'> <label for='checkbox 1'>Front-end Projects</label>
      <input id='checkbox 2' type='checkbox' value='checkbox 2'> <label for='checkbox 2'>Back-end Projects</label>
      <input id='checkbox 3' type='checkbox' value='checkbox 3'> <label for='checkbox 3'>Data Visualization</label>
      <input id='checkbox 4' type='checkbox' value='checkbox 4'> <label for='checkbox 4'>Challenges</label>
      <input id='checkbox 5' type='checkbox' value='checkbox 5'> <label for='checkbox 5'>Open Source Community</label>
      <input id='checkbox 6' type='checkbox' value='checkbox 6'> <label for='checkbox 6'>Gitter help rooms</label>
      <input id='checkbox 7' type='checkbox' value='checkbox 7'> <label for='checkbox 7'>Videos</label>
      <input id='checkbox 8' type='checkbox' value='checkbox 8'> <label for='checkbox 8'>City Meetups</label>
      <input id='checkbox 9' type='checkbox' value='checkbox 9'> <label for='checkbox 9'>Wiki</label>
      <input id='checkbox 10' type='checkbox' value='checkbox 10'> <label for='checkbox 10'>Forum</label>
      <input id='checkbox 11' type='checkbox' value='checkbox 11'> <label for='checkbox 11'>Additional Courses</label>
      </fieldset>
      <textarea></textarea>
      <button id='submit' type='submit'>Submit</button>
    </form>
  </body>
</html>
